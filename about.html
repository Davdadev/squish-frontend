<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About · 3Dfidgets.shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#fff9f0;--yellow:#FFD93D;--orange:#FF6B35;--pink:#FF4D8D;--dark:#1a1a2e}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark)}
    header{background:var(--yellow);border-bottom:3px solid var(--dark);padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:center;gap:.8rem;flex-wrap:wrap}
    .logo{font-family:'Lilita One',cursive;font-size:1.5rem;color:var(--dark);text-decoration:none}
    .nav{display:flex;gap:.5rem;flex-wrap:wrap}
    .nav a{font-family:'Fredoka One',cursive;font-size:.85rem;padding:.4rem .85rem;border-radius:999px;background:var(--dark);color:var(--yellow);text-decoration:none;border:2px solid var(--dark)}
    main{max-width:900px;margin:0 auto;padding:2rem 1rem}
    .card{background:#fff;border:3px solid var(--dark);border-radius:20px;padding:1.3rem;box-shadow:4px 4px 0 var(--dark)}
    h1{font-family:'Lilita One',cursive;font-size:2rem;margin-bottom:.8rem}
    p{line-height:1.7;font-weight:600;color:#444}
    footer{margin-top:2rem;background:var(--dark);color:var(--yellow);text-align:center;padding:1.2rem;font-family:'Fredoka One',cursive}
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">3Dfidgets.shop</a>
    <nav class="nav">
      <a href="index.html">Shop</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h1>About Us</h1>
      <p>
        We make playful, high-quality 3D printed fidgets in Australia. Every item is designed and printed with care,
        checked for smooth movement, and packed with love for all ages.
      </p>
    </section>
  </main>

  <footer>Made with ♥ &amp; filament</footer>
</body>
</html>
