<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - 3Dfidgets.shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Nunito', sans-serif; background: #fff9f0; color: #1a1a2e; margin: 0; }
    .cart-container { max-width: 700px; margin: 2rem auto; background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); padding: 2rem; }
    h1 { font-family: 'Lilita One', cursive; font-size: 2.2rem; margin-bottom: 1.5rem; }
    .cart-list { list-style: none; padding: 0; margin: 0 0 2rem 0; }
    .cart-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 1rem 0; }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-img { width: 64px; height: 64px; object-fit: cover; border-radius: 12px; margin-right: 1rem; }
    .cart-item-info { flex: 1; }
    .cart-item-title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; margin-bottom: 0.2rem; }
    .cart-item-price { color: #bc7f49; font-weight: 700; }
    .cart-item-controls { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn { font-size: 1.1rem; padding: 0.2rem 0.7rem; border-radius: 8px; border: 2px solid #1a1a2e; background: #fff; cursor: pointer; }
    .remove-btn { color: #ff4d8d; background: none; border: none; font-weight: 700; cursor: pointer; margin-left: 1rem; }
    .cart-total { text-align: right; font-size: 1.3rem; font-family: 'Fredoka One', cursive; margin-bottom: 2rem; }
    .checkout-btn { display: block; width: 100%; background: #ff6b35; color: #fff; font-family: 'Fredoka One', cursive; font-size: 1.2rem; padding: 1rem; border: none; border-radius: 100px; cursor: pointer; box-shadow: 2px 2px 0 #1a1a2e; transition: background 0.15s; }
    .checkout-btn:hover { background: #bc7f49; }
    .empty-cart { text-align: center; color: #aaa; font-size: 1.1rem; margin: 3rem 0; }
  </style>
</head>
<body>
  <div class="cart-container">
    <h1>Your Cart</h1>
    <ul class="cart-list" id="cartList"></ul>
    <div class="cart-total" id="cartTotal"></div>
    <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
    <div class="empty-cart" id="emptyCart" style="display:none;">Your cart is empty.</div>
  </div>
  <script>
    // Load cart.js and render cart page
    function onCartReady() {
      renderCartPage();
      document.getElementById('checkoutBtn').onclick = function() {
        // For now, just alert. Later, redirect to checkout.html with cart data.
        alert('Checkout flow coming soon!');
      };
    }
    if (typeof renderCartPage === 'undefined') {
      var s = document.createElement('script');
      s.src = 'cart.js';
      s.onload = onCartReady;
      document.body.appendChild(s);
    } else {
      onCartReady();
    }
  </script>
</body>
</html>
